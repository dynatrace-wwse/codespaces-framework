apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: kind
#containerdConfigPatches:
#  - |-
#    [plugins."io.containerd.grpc.v1.cri".registry]
#      [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
#        endpoint = ["https://registry-1.docker.io"]
#      [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
#        endpoint = ["http://localhost:5000"]
#      [plugins."io.containerd.grpc.v1.cri".registry.mirrors."*"]
#        endpoint = ["https://registry-1.docker.io"]
networking:
  # WARNING: It is _strongly_ recommended that you keep this the default
  # (127.0.0.1) for security reasons. However it is possible to change this.
  # Since is a training cluster, we open the internal API server to the world.
  # This is not recommended for production clusters. 
  apiServerAddress: "0.0.0.0"
  # By default the API server listens on a random open port.
  # You may choose a specific port but probably don't need to in most cases.
  # Using a random port makes it easier to spin up multiple clusters.
  apiServerPort: 6443
nodes:
- role: control-plane
  image: kindest/node:v1.30.0
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  # 
  # Start cleaning unused images when disk usage exceeds 85%
  # Stop cleaning once it drops below 80%
  # Remove any unused image older than 7 days regardless of disk pressure
  - |
    kind: KubeletConfiguration
    imageGCHighThresholdPercent: 85
    imageGCLowThresholdPercent: 80
    imageMaximumGCAge: 168h
  extraMounts:
  - hostPath: /
    containerPath: /mnt/root
  extraPortMappings:
  # Ingress controller ports (primary app exposure method)
  - hostPort: 80
    containerPort: 80
    protocol: TCP
  - hostPort: 443
    containerPort: 443
    protocol: TCP
  # Alternate ingress ports for envs where 80/443 are taken (e.g. ops-server Sysbox)
  # Matches K3D_LB_HTTP_PORT=30080 / K3D_LB_HTTPS_PORT=30443 set by the worker manager
  - hostPort: 30080
    containerPort: 80
    protocol: TCP
  - hostPort: 30443
    containerPort: 443
    protocol: TCP
  # Legacy NodePort mappings (backward compat, USE_LEGACY_PORTS=true)
  - hostPort: 30100
    containerPort: 30100
  - hostPort: 30200
    containerPort: 30200
  - hostPort: 30300
    containerPort: 30300