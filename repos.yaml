repos:
  # ── Enablement labs (source of truth for dynatrace-wwse.github.io registry) ──
  - name: enablement-kubernetes-101
    repo: dynatrace-wwse/enablement-kubernetes-101
    status: active
    maintainer: "@shinojosa, @saikkoj"
    description: "Introduction to Kubernetes fundamentals with Dynatrace. Learn core concepts — pods, deployments, services — and observe a live cluster with full-stack monitoring."
    tags: [kubernetes, dynatrace-app]
    title: "Kubernetes 101"
    primary_tag: kubernetes
    duration: "1.5h"

  - name: enablement-kubernetes-opentelemetry
    repo: dynatrace-wwse/enablement-kubernetes-opentelemetry
    status: active
    maintainer: "@shinojosa, @popecruzdt, @Tyler-Ouellette"
    description: "Full-stack Kubernetes observability with OpenTelemetry. Instrument cloud-native workloads, collect distributed traces, metrics, and logs, and correlate with Dynatrace topology."
    tags: [kubernetes, opentelemetry, legacy]
    title: "Kubernetes & OpenTelemetry"
    primary_tag: kubernetes
    duration: "3h"

  - name: enablement-dynatrace-ai-mcp
    repo: dynatrace-wwse/enablement-dynatrace-ai-mcp
    status: active
    maintainer: "@SudoSmitty, @shinojosa"
    description: "Hands-on AI/LLM observability workshop. Instrument a RAG application with OpenLLMetry, analyze traces in Dynatrace, and use the Dynatrace MCP server for agentic AI workflows."
    tags: [gen-ai, opentelemetry, mcp]
    title: "AI Observability & MCP"
    primary_tag: gen-ai
    image_tier: minimal
    duration: "2h"

  - name: enablement-gen-ai-llm-observability
    repo: dynatrace-wwse/enablement-gen-ai-llm-observability
    status: active
    maintainer: "@shinojosa"
    description: "Observe GenAI and LLM workloads end-to-end. Trace AI pipelines, monitor token usage and latency, and detect anomalies in AI-driven applications with Dynatrace."
    tags: [gen-ai, opentelemetry]
    title: "GenAI & LLM Observability"
    primary_tag: gen-ai
    duration: "2h"

  - name: enablement-business-observability
    repo: dynatrace-wwse/enablement-business-observability
    status: active
    maintainer: "@shinojosa, @popecruzdt, @mikeferg99, @RyB24"
    description: "Leverage Dynatrace BizEvents and dashboards to connect technical performance with real business outcomes. KPI tracking, funnel analysis, and custom business metrics."
    tags: [business-observability]
    title: "Business Observability"
    primary_tag: business-observability
    arch: amd64
    duration: "3h"

  - name: enablement-dql-301
    repo: dynatrace-wwse/enablement-dql-301
    status: active
    maintainer: "@shinojosa, @popecruzdt, @jwood1985, @RyB24"
    description: "Master the Dynatrace Query Language at an advanced level. Build powerful cross-signal queries spanning logs, traces, metrics and business events."
    tags: [logs, business-observability, kubernetes]
    title: "Advanced DQL 301"
    primary_tag: logs
    icon_key: dql
    duration: "1h"

  - name: enablement-dynatrace-log-ingest-101
    repo: dynatrace-wwse/enablement-dynatrace-log-ingest-101
    status: active
    maintainer: "@shinojosa, @popecruzdt, @agardnerIT"
    description: "Introduction to log ingestion and analytics. Learn how to ingest, parse, and analyse logs at scale using OpenPipeline and Dynatrace DQL."
    tags: [logs, kubernetes, dynatrace-app]
    title: "Log Ingestion 101"
    primary_tag: logs
    arch: amd64
    duration: "2h"

  - name: enablement-browser-dem-biz-observability
    repo: dynatrace-wwse/enablement-browser-dem-biz-observability
    status: active
    maintainer: "@shinojosa, @popecruzdt"
    description: "Browser Digital Experience Monitoring combined with business observability. Correlate real-user sessions with business KPIs in a single unified view."
    tags: [rum, business-observability]
    title: "Browser DEM & Business Observability"
    primary_tag: rum
    duration: "2h"

  - name: enablement-live-debugger-bug-hunting
    repo: dynatrace-wwse/enablement-live-debugger-bug-hunting
    status: active
    maintainer: "@shinojosa, @joshDynatrace, @ericyyuu, @popecruzdt"
    description: "Diagnose production issues in real-world scenarios using Dynatrace Live Debugger — no redeploys, no restarts. Step through running code with full observability context."
    tags: [live-debugger, devops, dynatrace-app]
    title: "Live Debugger & Bug Hunting"
    primary_tag: live-debugger
    duration: "2h"

  - name: enablement-workflow-essentials
    repo: dynatrace-wwse/enablement-workflow-essentials
    status: active
    maintainer: "@shinojosa, @popecruzdt, @sabielawold"
    description: "Build automated remediation, alerting, and integration workflows using the Dynatrace Workflow engine. From simple notifications to complex multi-step automations."
    tags: [workflows]
    title: "Workflow Essentials"
    primary_tag: workflows
    duration: "2.5h"

  - name: enablement-azure-webapp-otel
    repo: dynatrace-wwse/enablement-azure-webapp-otel
    status: active
    maintainer: "@shinojosa"
    description: "Deploy and observe Azure Web Apps with OpenTelemetry and Dynatrace. End-to-end instrumentation of cloud-hosted applications on Microsoft Azure."
    tags: [opentelemetry, azure, legacy]
    title: "Azure Web App & OpenTelemetry"
    primary_tag: opentelemetry
    duration: "2h"

  - name: enablement-codespaces-template
    repo: dynatrace-wwse/enablement-codespaces-template
    status: active
    maintainer: "@shinojosa"
    description: "The canonical template to kickstart your own enablement. All Codespaces Framework features pre-configured: docs, monitoring, devcontainer, and CI/CD out of the box."
    tags: [devops]
    title: "Codespaces Enablement Template"
    primary_tag: devops
    is_template: true
    duration: "1h"

  - name: enablement-app-training-template
    repo: dynatrace-wwse/enablement-app-training-template
    status: active
    maintainer: "@shinojosa"
    description: "Trainer-authoring scaffold for building interactive Dynatrace in-app enablement trainings on Orbital. Includes runnable examples for every interactive block type: shell verification, kubectl, DQL, assessments, and custom functions."
    tags: [devops, orbital]
    title: "App Training Template"
    primary_tag: devops
    is_template: true
    duration: "30min"

  - name: enablement-kubernetes-opentelemetry-openpipeline
    repo: dynatrace-wwse/enablement-kubernetes-opentelemetry-openpipeline
    status: active
    maintainer: "@shinojosa, @popecruzdt"
    description: "Combine Kubernetes OpenTelemetry collection with OpenPipeline processing. Route, transform, and enrich telemetry data before it reaches Dynatrace."
    tags: [kubernetes, opentelemetry, logs, legacy]
    title: "Kubernetes OTel & OpenPipeline"
    primary_tag: kubernetes
    duration: "3h"

  - name: enablement-dql-fundamentals
    repo: dynatrace-wwse/enablement-dql-fundamentals
    status: active
    maintainer: "@shinojosa, @popecruzdt"
    description: "Get started with the Dynatrace Query Language. Learn the fundamentals of querying logs, metrics, and events with hands-on exercises."
    tags: [logs, business-observability]
    title: "DQL Fundamentals"
    primary_tag: logs
    icon_key: dql
    duration: "1.5h"

  # ── Workshops ──
  - name: workshop-dynatrace-log-analytics
    repo: dynatrace-wwse/workshop-dynatrace-log-analytics
    status: active
    maintainer: "@shinojosa, @popecruzdt"
    description: "Workshop-format hands-on lab for log analytics. From ingestion to root-cause analysis — master the full log management lifecycle with Dynatrace."
    tags: [logs, kubernetes]
    title: "Log Analytics Workshop"
    primary_tag: logs
    arch: amd64
    duration: "3h"

  - name: workshop-destination-automation
    repo: dynatrace-wwse/workshop-destination-automation
    status: active
    maintainer: "@shinojosa, @popecruzdt"
    description: "Workshop on destination automation with Dynatrace Workflows. Build end-to-end automated pipelines for alerting, ticketing, and remediation."
    sync_managed: false
    ci: false
    tags: [workflows, ansible]
    title: "Destination Automation Workshop"
    primary_tag: workflows
    duration: "2h"

  # ── Demos ──
  - name: demo-mcp-unguard
    repo: dynatrace-wwse/demo-mcp-unguard
    status: active
    maintainer: "@shinojosa"
    description: "Security-focused demo using Model Context Protocol with the Unguard intentionally vulnerable application. Explore threat detection, attack surface analysis, and application security with Dynatrace."
    tags: [application-security, gen-ai]
    title: "MCP Unguard"
    primary_tag: application-security
    duration: "1h"

  - name: demo-opentelemetry
    repo: dynatrace-wwse/demo-opentelemetry
    status: active
    maintainer: "@shinojosa"
    description: "OpenTelemetry instrumentation demo with Dynatrace. See how traces, metrics, and logs flow from instrumented applications into the Dynatrace platform."
    tags: [opentelemetry, sandbox]
    title: "OpenTelemetry Demo"
    primary_tag: opentelemetry
    duration: "1h"

  - name: demo-astroshop-runtime-optimization
    repo: dynatrace-wwse/demo-astroshop-runtime-optimization
    status: active
    maintainer: "@shinojosa"
    description: "Optimize Astroshop runtime performance with Dynatrace. Identify bottlenecks, tune resource allocation, and measure improvements in a realistic microservices environment."
    tags: [kubernetes, devops, sandbox]
    title: "Astroshop Runtime Optimization"
    primary_tag: kubernetes
    duration: "1.5h"

  - name: demo-astroshop-problems
    repo: dynatrace-wwse/demo-astroshop-problems
    status: active
    maintainer: "@shinojosa"
    description: "Troubleshoot Astroshop problem scenarios with Dynatrace. Practice root-cause analysis on realistic failure modes across a distributed microservices stack."
    tags: [kubernetes, live-debugger, sanbox]
    title: "Astroshop Problem Scenarios"
    primary_tag: kubernetes
    duration: "1.5h"

  # ── Other framework-managed ──
  - name: ace-integration
    repo: dynatrace-wwse/ace-integration
    status: archived
    sync_managed: false
    listed: false
    ci: false
    maintainer: "@shinojosa"
    description: "R&D only — archived. Was used to explore ACE framework integration patterns. Not for training or production use."
    tags: [sandbox, demo]
    title: "ACE Integration"
    primary_tag: workflows
    duration: "2h"

  - name: enablement-openpipeline-segments-iam
    repo: dynatrace-wwse/enablement-openpipeline-segments-iam
    status: archived
    sync_managed: false
    listed: false
    ci: false
    maintainer: "@shinojosa"
    description: "Archived. ArgoCD/Backstage platform-engineering demo with its own NodePort scheme (cluster_installer.py: ArgoCD 30100, Backstage 30105). Not migrated to the ingress-only model in framework 1.5.0; left at its prior pin. Not for training or production use."
    tags: [sandbox, demo]
    title: "OpenPipeline, Segments & IAM"
    primary_tag: openpipeline
    duration: "2h"

  - name: bizobs-journey-simulator
    repo: dynatrace-wwse/bizobs-journey-simulator
    status: active
    maintainer: "@shinojosa, @lawrobar90"
    description: "Simulate realistic user journeys for business observability. Generate BizEvents, session replays, and funnel data to practice Dynatrace analytics."
    tags: [business-observability, rum, demo]
    title: "BizObs Journey Simulator"
    primary_tag: business-observability
    duration: "1h"

  - name: bug-busters
    repo: dynatrace-wwse/bug-busters
    status: active
    maintainer: "@shinojosa, @joshDynatrace"
    description: "Gamified bug hunting and troubleshooting challenges. Race against the clock to find and fix production issues across a realistic microservices environment."
    tags: [live-debugger, devops]
    title: "Bug Busters"
    primary_tag: live-debugger
    duration: "1.5h"

  - name: remote-environment
    repo: dynatrace-wwse/remote-environment
    status: active
    maintainer: "@shinojosa"
    description: "Provision and manage remote Dynatrace environments for distributed enablement scenarios. Streamline setup, configuration, and teardown of fully instrumented remote workspaces."
    tags: [devops, kubernetes]
    title: "Remote Environment"
    primary_tag: devops
    duration: "2h"

  # ── Framework (source of truth, not synced but managed) ──
  - name: codespaces-framework
    repo: dynatrace-wwse/codespaces-framework
    status: active
    maintainer: "@shinojosa"
    description: "Enablement framework — container image, sync CLI, core functions"
    sync_managed: false
    tags: [framework]
    listed: true

  # ── Non-framework repos (registered for registry, not synced) ──
  - name: dynatrace-wwse.github.io
    repo: dynatrace-wwse/dynatrace-wwse.github.io
    status: active
    maintainer: "@shinojosa"
    description: "Org GitHub Pages site and enablement registry"
    sync_managed: false
    ci: false
    tags: [website]
    listed: false

  - name: codespaces-tracker
    repo: dynatrace-wwse/codespaces-tracker
    status: active
    maintainer: "@shinojosa"
    description: "Codespaces usage tracking and analytics"
    sync_managed: false
    ci: false
    tags: [analytics]
    listed: false
