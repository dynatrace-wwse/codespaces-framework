# Enablement Ops Platform — Nginx reverse proxy
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 443 ssl http2;
    server_name autonomous-enablement.whydevslovedynatrace.com;

    ssl_certificate     /etc/letsencrypt/live/autonomous-enablement.whydevslovedynatrace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomous-enablement.whydevslovedynatrace.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Dashboard UI + API
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for live log streaming (future)
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # GitHub webhook endpoint (separate upstream)
    location /webhook {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-GitHub-Event $http_x_github_event;
        proxy_set_header X-GitHub-Delivery $http_x_github_delivery;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name autonomous-enablement.whydevslovedynatrace.com;
    return 301 https://$host$request_uri;
}
