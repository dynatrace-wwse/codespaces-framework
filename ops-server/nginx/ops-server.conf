# Enablement Ops Platform — nginx reverse proxy with GitHub SSO
#
# Auth strategy:
#   /api/auth/role         — opportunistic: forward X-Auth-User if session valid,
#                            fall through to backend (returns guest) when not.
#   write endpoints        — hard-enforce: auth_request must succeed (401 → JSON).
#   everything else        — public pass-through; backend enforces reads itself.

server {
    listen 443 ssl;  # http2 removed: Chrome reuses H2 connections for WebSocket, but nginx 1.24 doesn't support RFC 8441 extended CONNECT, so the WS upgrade fails silently.
    server_name autonomous-enablements.whydevslovedynatrace.com;

    ssl_certificate     /etc/letsencrypt/live/autonomous-enablements.whydevslovedynatrace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomous-enablements.whydevslovedynatrace.com/privkey.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── oauth2-proxy public endpoints (sign-in / callback / userinfo) ──────
    location /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal subrequest target used by auth_request directives below
    location = /oauth2/auth {
        internal;
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Uri  $request_uri;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    # ── Role detection for /api/auth/role ─────────────────────────────────
    # Opportunistic: forward X-Auth-User when the session is valid; fall
    # through to @auth_role_anonymous (no header → backend returns guest)
    # when the visitor is not signed in.  Never returns 401 to the caller.
    location = /api/auth/role {
        auth_request      /oauth2/auth;
        auth_request_set  $user  $upstream_http_x_auth_request_user;
        auth_request_set  $email $upstream_http_x_auth_request_email;
        error_page 401 = @auth_role_anonymous;

        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Unauthenticated fallback for /api/auth/role — no X-Auth-User sent,
    # backend returns {"role":"guest"}.
    location @auth_role_anonymous {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Write endpoints (require GitHub SSO) ──────────────────────────────
    # All require an authenticated, org-member session.  Unauthenticated
    # requests get a JSON 401 so the frontend can redirect to sign-in.
    # The backend additionally validates writer role and returns 403 for
    # non-members even if they somehow bypass nginx.

    location = /api/builds/trigger {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/builds/trigger-fleet {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/sync/run {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/sync/prs/invalidate {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/sync/issues/invalidate {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Shell-token endpoint — auth-gated, issues a single-use token used by
    # the WebSocket below.  Kept separate because auth_request is incompatible
    # with WebSocket upgrade proxying (nginx strips Upgrade after subrequest).
    location ~ ^/api/jobs/[^/]+/shell-token$ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket PTY bridge — no auth_request here; auth_request is incompatible
    # with WebSocket (nginx strips Upgrade header after subrequest, causing 404).
    # Authentication is done in FastAPI via the single-use shell token.
    location ~ ^/ws/jobs/[^/]+/shell$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    # POST /api/jobs/<id>/terminate — id is variable so use regex match
    location ~ ^/api/jobs/[^/]+/terminate$ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All /api/ghpages/* and /api/agent/* endpoints are writer-only
    location ~ ^/api/ghpages/ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/agent/ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/framework/ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @json_unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","sign_in":"/oauth2/sign_in"}';
    }

    # ── GitHub webhook (public — HMAC-signed by GitHub) ────────────────────
    location /webhook {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-GitHub-Event      $http_x_github_event;
        proxy_set_header X-GitHub-Delivery   $http_x_github_delivery;
    }

    # ── App proxy — streams k3d app traffic through the dashboard backend ──
    # No auth_request: the backend validates the job_id against Redis and
    # only proxies if a valid app_proxy_port is present for that job.
    # add_header here replaces the server-level X-Frame-Options DENY so the
    # embedded iframe can load app content from the same origin.
    location ~ ^/apps/ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_read_timeout     60;
    }

    # ── Public: dashboard UI + read-only API ───────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name autonomous-enablements.whydevslovedynatrace.com;
    return 301 https://$host$request_uri;
}
