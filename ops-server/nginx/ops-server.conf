# Enablement Ops Platform — nginx reverse proxy with GitHub SSO on writes
#
# Public (no auth):  /, /static/*, /api/repos, /api/workers, /api/health,
#                    /api/builds/running, /api/nightly/latest, /api/auth/role,
#                    /api/branches/all, /api/builds/history, /api/sync/history,
#                    /api/sync/commands, /webhook
# Protected (SSO):   POST /api/builds/trigger
#                    POST /api/builds/trigger-fleet
#                    POST /api/sync/run
#                    POST /api/jobs/<id>/terminate
#
# All write endpoints flow through @writer_protected which adds the
# auth_request to oauth2-proxy and forwards X-Auth-User to the dashboard.
# The backend further validates the user is a member of the GitHub org
# (writer role); guests get a 403 even if they bypass nginx somehow.

server {
    listen 443 ssl http2;
    server_name autonomous-enablements.whydevslovedynatrace.com;

    ssl_certificate     /etc/letsencrypt/live/autonomous-enablements.whydevslovedynatrace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autonomous-enablements.whydevslovedynatrace.com/privkey.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── oauth2-proxy public endpoints (sign-in / callback / userinfo) ──────
    location /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal subrequest used by auth_request below
    location = /oauth2/auth {
        internal;
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Uri  $request_uri;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    # ── Protected: write endpoints (require GitHub SSO) ────────────────────
    # All of these require an authenticated org member. The backend then
    # additionally checks the writer role via /orgs/<org>/memberships/<user>
    # and returns 403 for non-members. Guests (not signed in) get a 401
    # with a JSON body so the frontend can route to /oauth2/sign_in.

    location = /api/builds/trigger {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user   $upstream_http_x_auth_request_user;
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/builds/trigger-fleet {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user   $upstream_http_x_auth_request_user;
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/sync/run {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user   $upstream_http_x_auth_request_user;
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # POST /api/jobs/<id>/terminate — regex match because <id> is variable
    location ~ ^/api/jobs/[^/]+/terminate$ {
        auth_request /oauth2/auth;
        error_page 401 = @json_unauthorized;
        auth_request_set $user   $upstream_http_x_auth_request_user;
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api/auth/role: pass through the X-Auth-User header opportunistically.
    # If the user has a valid oauth2-proxy session, they get a writer role;
    # if not, the backend returns guest. Don't 401 here — the dashboard's
    # role check should never block a guest's read-only experience.
    location = /api/auth/role {
        auth_request /oauth2/auth;
        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        # Don't error_page on 401 — the dashboard's @json_unauthorized
        # is reserved for write endpoints.
        error_page 401 = @auth_role_anonymous;
        proxy_set_header X-Auth-User  $user;
        proxy_set_header X-Auth-Email $email;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @auth_role_anonymous {
        # Hand the request to the backend without X-Auth-User; the role
        # endpoint will return guest.
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @json_unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","sign_in":"/oauth2/sign_in"}';
    }

    # ── GitHub webhook (public — HMAC-signed by GitHub) ────────────────────
    location /webhook {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-GitHub-Event      $http_x_github_event;
        proxy_set_header X-GitHub-Delivery   $http_x_github_delivery;
    }

    # ── Public: dashboard UI + read-only API ───────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name autonomous-enablements.whydevslovedynatrace.com;
    return 301 https://$host$request_uri;
}
