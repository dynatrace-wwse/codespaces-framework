# Per-repo GitHub Actions workflow — drop in `.github/workflows/integration-arm64.yml`.
# Pair with `integration-amd64.yml`. Each workflow is single-arch so the
# ops dashboard can record pass/fail per architecture.

name: Integration Test arm64

on:
  pull_request:
  workflow_dispatch:
    inputs:
      requested_by:
        description: "Who triggered this run (recorded in logs)"
        type: string
        default: "dashboard"

jobs:
  integration:
    runs-on: ubuntu-24.04-arm     # GitHub-hosted ARM runner (free for public repos)
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: |
          if [ -f .devcontainer/test/integration.sh ]; then
            bash .devcontainer/test/integration.sh
          else
            echo "No .devcontainer/test/integration.sh in this repo — skipping."
          fi
